<body>

<main>

<h1>🎮 互動任務</h1>

<div class="quiz">

<p><strong>第一題：</strong>埤塘最早的主要功能是什麼？</p>
<button onclick="alert('✅ 答對了！埤塘最早主要用於農田灌溉。')">灌溉</button>
<button onclick="alert('❌ 再想想看！')">觀光</button>

</div>

<hr>

<div class="quiz">

<p><strong>第二題：</strong>桃園有什麼著名稱號？</p>
<button onclick="alert('❌ 不對喔！')">水果之鄉</button>
<button onclick="alert('✅ 答對了！桃園有「千塘之鄉」的美稱。')">千塘之鄉</button>

</div>

<hr>

<div class="quiz">

<p><strong>第三題：</strong>下厝埤現在除了蓄水外，還有什麼功能？</p>
<button onclick="alert('✅ 答對了！具有生態保育與景觀休憩功能。')">生態保育</button>
<button onclick="alert('❌ 再試一次！')">工業生產</button>

</div>

<hr>

<div class="quiz">

<p><strong>第四題：</strong>下列哪個是常見的水生植物？</p>
<button onclick="alert('✅ 答對了！睡蓮是常見的水生植物。')">睡蓮</button>
<button onclick="alert('❌ 不是喔！')">松樹</button>

</div>

<hr>

<div class="quiz">

<p><strong>第五題：</strong>埤塘對生態環境的重要性是什麼？</p>
<button onclick="alert('✅ 正確！提供許多生物棲息空間。')">提供生物棲息地</button>
<button onclick="alert('❌ 再想想看！')">增加交通流量</button>

</div>

</main>
