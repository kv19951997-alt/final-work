<section>
     <h2>🐛 昆蟲與植物關係</h2>
   
     <p>
       下厝埤周圍擁有豐富的植物資源與濕地環境，為許多昆蟲提供了良好的棲息空間。
       在埤塘生態系中，昆蟲與植物之間有著密不可分的關係，兩者透過授粉、覓食、
       棲息及繁殖等方式相互影響，共同維持生態系統的穩定運作。
     </p>
   
     <p>
       許多開花植物會吸引蜜蜂、蝴蝶及其他授粉昆蟲前來採集花蜜。
       當昆蟲在不同花朵之間移動時，花粉會附著在牠們的身體上，
       並被帶到其他花朵，幫助植物完成授粉與繁殖。
     </p>
   
     <p>
       昆蟲與植物之間並非單向關係，而是互相依存、共同生存。
       因此，保護埤塘周圍的自然環境非常重要。
     </p>
   
     
   </section>
